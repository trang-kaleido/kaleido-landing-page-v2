<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaleido — Hexagon Components</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="kaleido_tokens.css">
<style>
  /* All color/type tokens come from kaleido_tokens.css — no :root here. */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.07em;
    padding: 60px 52px;
    min-height: 100vh;
  }

  .section-label {
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 0.12em;
    text-transform: lowercase;
    margin-bottom: 40px;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--ink-mid);
    margin: 80px 0;
  }

  /* ─── COMPRESSION MARK ─── */
  .compression-section { max-width: 680px; }
  .compression-equation {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--paper);
    opacity: 0.7;
    letter-spacing: 0.06em;
    margin-bottom: 32px;
  }
  .compression-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ─── HEXAGON SECTION ─── */
  .hexagon-section {
    display: flex;
    gap: 80px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .hexagon-main { flex: 0 0 auto; }

  /* ─── ICON ZOOM GRID ─── */
  .icon-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }
  .icon-card {
    background: var(--ink-mid);
    border: 1px solid rgba(245,241,236,0.08);
    padding: 20px;
    border-radius: var(--radius-sm);
  }
  .icon-card-label {
    font-size: 9px;
    color: var(--ink-soft);
    letter-spacing: 0.14em;
    margin-bottom: 4px;
  }
  .icon-card-name {
    font-size: 11px;
    color: var(--paper);
    opacity: 0.6;
    margin-bottom: 16px;
    letter-spacing: 0.08em;
  }
  .icon-zoom {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 80px;
  }
</style>
</head>
<body>

<!-- ================================================================
     SVG SYMBOL DEFINITIONS
     Source of truth: kaleido_symbols.html — edit there first.
     Embedded here for local file:// compatibility.
     ================================================================ -->
<svg style="display:none" aria-hidden="true">
  <defs>
    <symbol id="icon-material" viewBox="0 0 100 100">
      <polygon points="50,12 88,50 50,88 12,50" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
      <circle cx="50" cy="50" r="5" fill="currentColor" stroke="none"/>
    </symbol>
    <symbol id="icon-progress" viewBox="0 0 100 100">
      <polyline points="18,24 50,50 18,76" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="46,24 78,50 46,76" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-collective" viewBox="0 0 100 100">
      <circle cx="36" cy="50" r="25" fill="none" stroke="currentColor" stroke-width="3"/>
      <circle cx="64" cy="50" r="25" fill="none" stroke="currentColor" stroke-width="3"/>
    </symbol>
    <symbol id="icon-preservation" viewBox="0 0 100 100">
      <rect x="16" y="16" width="68" height="68" fill="none" stroke="currentColor" stroke-width="3"/>
      <line x1="50" y1="16" x2="50" y2="84" stroke="currentColor" stroke-width="2"/>
      <line x1="16" y1="50" x2="84" y2="50" stroke="currentColor" stroke-width="2"/>
      <circle cx="50" cy="50" r="4" fill="currentColor" stroke="none"/>
    </symbol>
    <symbol id="icon-sustainable" viewBox="0 0 100 100">
      <path d="M 14,18 L 86,18 L 50,50 Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
      <path d="M 14,82 L 86,82 L 50,50 Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-individual" viewBox="0 0 100 100">
      <circle cx="50" cy="30" r="18" fill="none" stroke="currentColor" stroke-width="3"/>
      <circle cx="50" cy="30" r="5" fill="currentColor" stroke="none"/>
      <path d="M 24,52 L 76,52 L 50,84 Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-nucleus" viewBox="0 0 100 100">
      <polygon points="50,10 85,30 85,70 50,90 15,70 15,30" fill="currentColor" stroke="none"/>
    </symbol>
    <symbol id="hex-mark" viewBox="0 0 100 100">
      <polygon points="50,3 90.7,26.5 90.7,73.5 50,97 9.3,73.5 9.3,26.5" fill="none" stroke="currentColor" stroke-width="1.5" opacity="1"/>
      <polygon points="50,15 80.3,32.5 80.3,67.5 50,85 19.7,67.5 19.7,32.5" fill="none" stroke="currentColor" stroke-width="1" opacity="0.55"/>
      <polygon points="50,26 70.8,38 70.8,62 50,74 29.2,62 29.2,38" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.32"/>
      <polygon points="50,37 61.3,43.5 61.3,56.5 50,63 38.7,56.5 38.7,43.5" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.18"/>
      <circle cx="50" cy="50" r="4" fill="var(--signal)" stroke="none"/>
    </symbol>
    <symbol id="hex-framework" viewBox="0 0 300 300">
      <polygon points="150,40 245.3,95 245.3,205 150,260 54.7,205 54.7,95" fill="none" stroke="currentColor" stroke-width="1.5" opacity="1"/>
      <polygon points="150,66 222.7,108 222.7,192 150,234 77.3,192 77.3,108" fill="none" stroke="currentColor" stroke-width="1" opacity="0.55"/>
      <polygon points="150,92 200.2,121 200.2,179 150,208 99.8,179 99.8,121" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.32"/>
      <polygon points="150,118 177.7,134 177.7,166 150,182 122.3,166 122.3,134" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.18"/>
      <g stroke="var(--signal)" stroke-width="0.8" opacity="0.40">
        <line x1="150" y1="40"    x2="150" y2="150"/>
        <line x1="245.3" y1="95"  x2="150" y2="150"/>
        <line x1="245.3" y1="205" x2="150" y2="150"/>
        <line x1="150" y1="260"   x2="150" y2="150"/>
        <line x1="54.7" y1="205"  x2="150" y2="150"/>
        <line x1="54.7" y1="95"   x2="150" y2="150"/>
      </g>
      <g fill="var(--signal)" stroke="none">
        <circle cx="150"   cy="40"  r="4"/>
        <circle cx="245.3" cy="95"  r="4"/>
        <circle cx="245.3" cy="205" r="4"/>
        <circle cx="150"   cy="260" r="4"/>
        <circle cx="54.7"  cy="205" r="4"/>
        <circle cx="54.7"  cy="95"  r="4"/>
      </g>
      <circle cx="150" cy="150" r="10" fill="none" stroke="var(--signal)" stroke-width="1" opacity="0.35"/>
      <circle cx="150" cy="150" r="5"  fill="var(--signal)" stroke="none"/>
      <use href="#icon-material"     x="138"  y="2"   width="24" height="24" color="currentColor"/>
      <use href="#icon-progress"     x="255.8" y="70"  width="24" height="24" color="currentColor"/>
      <use href="#icon-collective"   x="255.8" y="206" width="24" height="24" color="currentColor"/>
      <use href="#icon-preservation" x="138"  y="274" width="24" height="24" color="currentColor"/>
      <use href="#icon-sustainable"  x="20.2" y="206" width="24" height="24" color="currentColor"/>
      <use href="#icon-individual"   x="20.2" y="70"  width="24" height="24" color="currentColor"/>
    </symbol>
  </defs>
</svg>


<!-- ═══════════════════════════════════════════════════════════
     SECTION 1 — COMPRESSION MARK
════════════════════════════════════════════════════════════ -->
<p class="section-label">01 — compression mark</p>

<div class="compression-section">
  <p class="compression-equation">many questions → one infrastructure</p>
  <div class="compression-wrap">
    <!-- Convergence point (200,50). Left fan: 14 lines converging from x=0.
         Right fan: 4 signal lines expanding to x=520. -->
    <svg width="520" height="100" viewBox="0 0 520 100" fill="none"
         style="width:100%; max-width:520px; display:block;">
      <!-- Left fan — paper tones, varied opacity -->
      <line x1="0" y1="3"  x2="200" y2="50" stroke="rgba(245,241,236,0.18)" stroke-width="0.6"/>
      <line x1="0" y1="10" x2="200" y2="50" stroke="rgba(245,241,236,0.22)" stroke-width="0.6"/>
      <line x1="0" y1="18" x2="200" y2="50" stroke="rgba(245,241,236,0.28)" stroke-width="0.6"/>
      <line x1="0" y1="26" x2="200" y2="50" stroke="rgba(245,241,236,0.34)" stroke-width="0.6"/>
      <line x1="0" y1="34" x2="200" y2="50" stroke="rgba(245,241,236,0.40)" stroke-width="0.6"/>
      <line x1="0" y1="41" x2="200" y2="50" stroke="rgba(245,241,236,0.48)" stroke-width="0.6"/>
      <line x1="0" y1="47" x2="200" y2="50" stroke="rgba(245,241,236,0.55)" stroke-width="0.6"/>
      <line x1="0" y1="53" x2="200" y2="50" stroke="rgba(245,241,236,0.55)" stroke-width="0.6"/>
      <line x1="0" y1="59" x2="200" y2="50" stroke="rgba(245,241,236,0.48)" stroke-width="0.6"/>
      <line x1="0" y1="66" x2="200" y2="50" stroke="rgba(245,241,236,0.40)" stroke-width="0.6"/>
      <line x1="0" y1="74" x2="200" y2="50" stroke="rgba(245,241,236,0.34)" stroke-width="0.6"/>
      <line x1="0" y1="82" x2="200" y2="50" stroke="rgba(245,241,236,0.28)" stroke-width="0.6"/>
      <line x1="0" y1="90" x2="200" y2="50" stroke="rgba(245,241,236,0.22)" stroke-width="0.6"/>
      <line x1="0" y1="97" x2="200" y2="50" stroke="rgba(245,241,236,0.18)" stroke-width="0.6"/>
      <!-- Right fan — signal, with arrowheads -->
      <line x1="200" y1="50" x2="508" y2="14" stroke="#5B6FA6" stroke-width="1.1" opacity="0.70"/>
      <polygon points="516,11 504,12 508,20" fill="#5B6FA6" opacity="0.70"/>
      <line x1="200" y1="50" x2="508" y2="36" stroke="#5B6FA6" stroke-width="1.1" opacity="0.65"/>
      <polygon points="516,34 504,34 508,41" fill="#5B6FA6" opacity="0.65"/>
      <line x1="200" y1="50" x2="508" y2="64" stroke="#5B6FA6" stroke-width="1.1" opacity="0.60"/>
      <polygon points="516,66 504,66 508,59" fill="#5B6FA6" opacity="0.60"/>
      <line x1="200" y1="50" x2="508" y2="86" stroke="#5B6FA6" stroke-width="1.1" opacity="0.55"/>
      <polygon points="516,89 504,86 508,79" fill="#5B6FA6" opacity="0.55"/>
      <!-- Center: ring + dot -->
      <circle cx="200" cy="50" r="10" stroke="#5B6FA6" stroke-width="0.8" fill="none" opacity="0.35"/>
      <circle cx="200" cy="50" r="5"  fill="#5B6FA6"/>
    </svg>
  </div>
</div>

<div class="divider"></div>

<!-- ═══════════════════════════════════════════════════════════
     SECTION 2 — HEX-FRAMEWORK
════════════════════════════════════════════════════════════ -->
<p class="section-label">02 — hex-framework · with force icons at vertices</p>

<div class="hexagon-section">

  <!-- Full framework hexagon — single <use>, all geometry inside the symbol -->
  <div class="hexagon-main">
    <svg width="240" height="240" style="color: var(--paper);">
      <use href="#hex-framework"/>
    </svg>
  </div>

  <!-- Icon zoom cards — new icons at 80px -->
  <div class="icon-grid">

    <div class="icon-card">
      <p class="icon-card-label">top vertex</p>
      <p class="icon-card-name">material</p>
      <div class="icon-zoom">
        <svg width="80" height="80" style="color: var(--icon-stroke);">
          <use href="#icon-material"/>
        </svg>
      </div>
    </div>

    <div class="icon-card">
      <p class="icon-card-label">top-right vertex</p>
      <p class="icon-card-name">progress</p>
      <div class="icon-zoom">
        <svg width="80" height="80" style="color: var(--icon-stroke);">
          <use href="#icon-progress"/>
        </svg>
      </div>
    </div>

    <div class="icon-card">
      <p class="icon-card-label">bottom-right vertex</p>
      <p class="icon-card-name">collective</p>
      <div class="icon-zoom">
        <svg width="80" height="80" style="color: var(--icon-stroke);">
          <use href="#icon-collective"/>
        </svg>
      </div>
    </div>

    <div class="icon-card">
      <p class="icon-card-label">bottom vertex</p>
      <p class="icon-card-name">preservation</p>
      <div class="icon-zoom">
        <svg width="80" height="80" style="color: var(--icon-stroke);">
          <use href="#icon-preservation"/>
        </svg>
      </div>
    </div>

    <div class="icon-card">
      <p class="icon-card-label">bottom-left vertex</p>
      <p class="icon-card-name">sustainable</p>
      <div class="icon-zoom">
        <svg width="80" height="80" style="color: var(--icon-stroke);">
          <use href="#icon-sustainable"/>
        </svg>
      </div>
    </div>

    <div class="icon-card">
      <p class="icon-card-label">top-left vertex</p>
      <p class="icon-card-name">individual</p>
      <div class="icon-zoom">
        <svg width="80" height="80" style="color: var(--icon-stroke);">
          <use href="#icon-individual"/>
        </svg>
      </div>
    </div>

  </div>
</div>

<div style="height: 80px;"></div>

</body>
</html>
