<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kaleido — IELTS Writing Task 2">
  <title>Kaleido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:         #111236;
      --paper:       #F5F1EC;
      --signal:      #5B6FA6;
      --mid:         rgba(245,241,236,0.62);
      --dim:         rgba(245,241,236,0.28);
      --serif: 'Cormorant Garamond', Georgia, serif;
      --mono:  'DM Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--ink);
      color: var(--paper);
      font-family: var(--serif);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .wordmark {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--paper);
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-family: var(--mono);
      font-size: clamp(0.6rem, 1.6vw, 0.72rem);
      letter-spacing: 0.12em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 4rem;
    }

    .choices {
      display: flex;
      gap: 1.5rem;
    }

    .lang-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      padding: 1.6rem 2.8rem;
      border: 1px solid rgba(245,241,236,0.14);
      text-decoration: none;
      color: var(--paper);
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }

    .lang-btn:hover {
      border-color: rgba(245,241,236,0.42);
      background: rgba(245,241,236,0.04);
    }

    .lang-btn .label {
      font-family: var(--serif);
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .lang-btn .sub {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--dim);
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .choices { flex-direction: column; gap: 1rem; }
      .lang-btn { padding: 1.4rem 3rem; }
    }
  </style>
</head>
<body>

  <p class="wordmark">Kaleido</p>
  <p class="tagline">IELTS Writing Task 2</p>

  <div class="choices">
    <a class="lang-btn" href="/en">
      <span class="label">English</span>
      <span class="sub">EN</span>
    </a>
    <a class="lang-btn" href="/vi">
      <span class="label">Tiếng Việt</span>
      <span class="sub">VI</span>
    </a>
  </div>

  <script>
    const lang = (navigator.language || '').toLowerCase();
    if (lang.startsWith('vi')) location.replace('/vi');
    else if (lang.startsWith('en')) location.replace('/en');
  </script>

</body>
</html>
