<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KALEIDO — IELTS Writing Task 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
}

body {
  background: #F5F1EC;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.k-root {
  background: #F5F1EC;
  min-height: 100vh;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 100px 48px;
  position: relative;
  overflow: hidden;
}

.k-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.k-bq {
  position: absolute;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: rgba(17,18,54,0.028);
  white-space: nowrap;
  letter-spacing: 0.02em;
}

.k-body {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  width: 100%;
  max-width: 420px;
}

.k-mark {
  margin-bottom: 44px;
  opacity: 0;
  animation: kr 1.1s cubic-bezier(0.16,1,0.3,1) 0s forwards;
}

.k-word {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 46px;
  letter-spacing: 0.22em;
  color: #111236;
  line-height: 1;
  margin-bottom: 12px;
  opacity: 0;
  animation: kr 1.1s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
}

.k-rule {
  width: 28px;
  height: 0.5px;
  background: #C9C0B4;
  margin: 0 auto 12px;
  opacity: 0;
  animation: kr 0.9s ease 0.2s forwards;
}

.k-sub {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.16em;
  color: #6B6A82;
  text-transform: uppercase;
  margin-bottom: 64px;
  opacity: 0;
  animation: kr 0.9s ease 0.26s forwards;
}

.k-intro {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 17px;
  color: #6B6A82;
  line-height: 1.7;
  margin-bottom: 52px;
  opacity: 0;
  animation: kr 0.9s ease 0.34s forwards;
  max-width: 300px;
}

.k-choices {
  display: flex;
  flex-direction: column;
  width: 100%;
  opacity: 0;
  animation: kr 0.8s ease 0.46s forwards;
  border: 0.5px solid #C9C0B4;
}

.k-choice {
  background: transparent;
  border: none;
  outline: none;
  padding: 28px 40px;
  cursor: pointer;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  text-decoration: none;
}

.k-choice + .k-choice {
  border-top: 0.5px solid #C9C0B4;
}

.k-choice::after {
  content: '';
  position: absolute;
  inset: 0;
  background: #111236;
  opacity: 0;
  transition: opacity 0.26s ease;
}

.k-choice:hover::after { opacity: 1; }
.k-choice:hover .k-cn { color: #F5F1EC; }
.k-choice:hover .k-cl { color: #5B6FA6; }

.k-cn {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 400;
  color: #2E2D4E;
  transition: color 0.26s ease;
  line-height: 1;
  position: relative;
  z-index: 1;
}

.k-cl {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.16em;
  color: #C8C6D8;
  transition: color 0.26s ease;
  position: relative;
  z-index: 1;
}

.k-foot {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: #C8C6D8;
  margin-top: 64px;
  opacity: 0;
  animation: kr 0.7s ease 0.64s forwards;
}

@keyframes kr {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="k-bg" id="kbg" aria-hidden="true"></div>

<div class="k-root">
  <div class="k-body">

    <div class="k-mark">
      <svg width="38" height="38" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,3 97,27.5 97,72.5 50,97 3,72.5 3,27.5" stroke="#111236" stroke-width="1.5" fill="none"/>
        <polygon points="50,18 82,35 82,65 50,82 18,65 18,35" stroke="#111236" stroke-width="1" fill="none" opacity="0.36"/>
        <polygon points="50,33 67,42 67,58 50,67 33,58 33,42" stroke="#111236" stroke-width="0.7" fill="none" opacity="0.14"/>
        <circle cx="50" cy="50" r="5" fill="#5B6FA6"/>
      </svg>
    </div>

    <div class="k-word">KALEIDO</div>
    <div class="k-rule"></div>
    <div class="k-sub">IELTS Writing Task 2</div>

    <div class="k-intro">
      writing is not a language skill.<br>it is a thinking skill.
    </div>

    <div class="k-choices">
      <a href="/en" class="k-choice">
        <span class="k-cn">English</span>
        <span class="k-cl">EN</span>
      </a>
      <a href="/vi" class="k-choice">
        <span class="k-cn">Tiếng Việt</span>
        <span class="k-cl">VI</span>
      </a>
    </div>

    <div class="k-foot">Hanoi · 2026</div>

  </div>
</div>

<script>
const qs = [
  "Should governments invest more in public transport?",
  "Is technology making us less creative?",
  "Some people think education should be free.",
  "Is globalisation a positive development?",
  "Does social media do more harm than good?",
  "Should the arts receive government funding?",
  "Is online learning as effective?",
  "Should voting be compulsory?",
  "Is fast fashion an environmental problem?",
  "Should capital punishment be abolished?",
  "Is space exploration a waste of money?",
  "Should wealthy nations help poorer ones?",
  "Is economic growth more important than the environment?",
  "Do celebrities have a responsibility to be role models?",
  "Should children learn a second language from birth?",
  "Does workplace stress cause significant illness?",
  "Should private cars be taxed to fund public transport?",
  "Is globalisation making cultures increasingly similar?",
  "Should financial literacy be taught in schools?",
  "Are smartphones destroying social interaction?",
  "Could AI replace teachers in the future?",
  "Should governments limit household waste?"
];

const bg = document.getElementById('kbg');
qs.forEach((q, i) => {
  const el = document.createElement('div');
  el.className = 'k-bq';
  el.textContent = q;
  const col = i % 3;
  const row = Math.floor(i / 3);
  el.style.left = (col / 3 * 84 + 3 + ((i * 37 + 11) % 11 - 5)) + '%';
  el.style.top  = (row / Math.ceil(qs.length / 3) * 88 + 3 + ((i * 53 + 7) % 9 - 4)) + '%';
  el.style.transform = `rotate(${((i * 17) % 8 - 4) * 0.2}deg)`;
  bg.appendChild(el);
});
</script>
</body>
</html>
